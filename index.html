<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI学生评语生成器</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --text: #1a1d26;
      --muted: #5c6370;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: #eef2ff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --gold: #b45309;
      --gold-bg: #fffbeb;
      --steady: #0369a1;
      --steady-bg: #e0f2fe;
      --care: #b91c1c;
      --care-bg: #fef2f2;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 1.75rem;
    }

    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    code.inline {
      font-size: 0.85em;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 0.12em 0.4em;
      border-radius: 6px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 840px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-head {
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .panel-body {
      padding: 1rem 1.1rem;
    }

    label[for="bulk-input"] {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    #bulk-input {
      width: 100%;
      min-height: 280px;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: ui-monospace, "Cascadia Code", "Consolas", monospace-zh, monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      background: #fafbfc;
    }

    #bulk-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s, box-shadow 0.15s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 12px rgba(79, 70, 229, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #f8fafc;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .actions .note {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0;
      text-align: center;
    }

    .results-section {
      margin-top: 2rem;
    }

    .results-section h2 {
      font-size: 1.1rem;
      margin: 0 0 1rem;
      font-weight: 600;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.15rem 1.25rem;
    }

    .card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0.02em;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
    }

    .badge-gold {
      background: var(--gold-bg);
      color: var(--gold);
    }

    .badge-steady {
      background: var(--steady-bg);
      color: var(--steady);
    }

    .badge-care {
      background: var(--care-bg);
      color: var(--care);
    }

    .card-meta {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-comment {
      margin: 0;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-loading {
      position: relative;
      overflow: hidden;
    }

    .card-loading::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .card-error {
      border-color: var(--error-border);
      background: var(--error-bg);
    }

    .card-error .card-comment {
      color: var(--care);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI学生评语生成器</h1>
      <p class="hint">
        请提供每行一名学生的数据，列为 <strong>姓名、这次成绩、上次成绩、出勤率、作业表现</strong>，可用 <strong>Tab</strong>、空格、<strong>顿号</strong> <code class="inline">、</code> 或中英文逗号 <code class="inline">,</code> <code class="inline">，</code> 分隔。<strong>至少需要提供姓名与这次成绩才可分析。</strong>
      </p>
    </header>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-head">批量输入</div>
        <div class="panel-body">
          <label for="bulk-input">粘贴或输入多行数据</label>
          <textarea
            id="bulk-input"
            placeholder="赵六	88&#10;张三	88	82	95%	优&#10;李四、88、71、全勤、良"
            spellcheck="false"
          ></textarea>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">操作</div>
        <div class="panel-body actions">
          <button type="button" class="btn btn-primary" id="btn-generate">生成 AI 评语</button>
          <button type="button" class="btn btn-secondary" id="btn-export" disabled>导出 Excel（姓名 | 评语）</button>
          <p class="note">导出为 .xlsx；若加载失败则尝试 CSV</p>
        </div>
      </div>
    </div>

    <section class="results-section" aria-live="polite">
      <h2>评语卡片</h2>
      <div id="results" class="cards"></div>
    </section>
  </div>

  <script>
    /* ========== 【可修改区域】AI 接口配置 BEGIN ========== */
    const AI_CONFIG = {
      apiKey: "sk-ehnixmakhigjbzchzwnfabbhfnqvcignoztusjpvkjofmudk",
      apiUrl: "https://api.siliconflow.cn/v1/chat/completions",
      model: "Pro/zai-org/GLM-4.7",
      systemPrompt: "你是一个专业的班主任，擅长根据学生的成绩、出勤率、作业表现等数据，写出既专业又有温度的评语。评语应简练且具有针对性，包含对现状的分析和对未来的建议。语气要亲切、自然，像是在面对面和学生交流。避免过于死板的公文语气。"
    };
    /* ========== 【可修改区域】END ========== */

    let lastExportRows = [];

    /** 单行内各列可用 Tab、空格、顿号、中英文逗号分隔；连续同类分隔符保留空列位置 */
    function splitDataLine(raw) {
      const parts = [];
      let buf = "";
      const isCommaLike = (ch) => ch === "、" || ch === "," || ch === "，";
      for (let i = 0; i < raw.length; i++) {
        const c = raw[i];
        if (c === "\t" || isCommaLike(c)) {
          parts.push(buf.trim());
          buf = "";
          continue;
        }
        if (c === " " || c === "\u3000") {
          if (buf.length) {
            parts.push(buf.trim());
            buf = "";
          }
          while (
            i + 1 < raw.length &&
            (raw[i + 1] === " " || raw[i + 1] === "\u3000")
          ) {
            i++;
          }
          continue;
        }
        buf += c;
      }
      parts.push(buf.trim());
      return parts;
    }

    const PARSE_ERROR_MSG = "至少需姓名和这次成绩";

    function pickTierKey(current) {
      if (current >= 90) return "gold";
      if (current >= 70) return "steady";
      return "care";
    }

    function badgeClassForTier(key) {
      if (key === "gold") return "badge-gold";
      if (key === "steady") return "badge-steady";
      return "badge-care";
    }

    function parseLine(line) {
      const raw = line.trim();
      if (!raw) return null;

      const parts = splitDataLine(raw);
      const missingFields = [];

      if (parts.length < 2) {
        return { error: PARSE_ERROR_MSG };
      }

      const name = parts[0];
      if (!name) {
        return { error: PARSE_ERROR_MSG };
      }

      const current = parseFloat(parts[1]);
      if (Number.isNaN(current)) {
        return { error: PARSE_ERROR_MSG };
      }

      let last = null;
      let hasLast = false;
      let attendance = null;
      let homework = null;

      if (parts.length === 2) {
        missingFields.push("上次成绩", "出勤率", "作业表现");
      } else {
        const lastRaw = parts[2];
        hasLast = lastRaw !== "" && !Number.isNaN(parseFloat(lastRaw));
        if (hasLast) last = parseFloat(lastRaw);
        else missingFields.push("上次成绩");

        if (parts.length === 3) {
          missingFields.push("出勤率", "作业表现");
        } else if (parts.length === 4) {
          const attRaw = parts[3];
          if (attRaw === "") missingFields.push("出勤率");
          else attendance = attRaw;
          missingFields.push("作业表现");
        } else {
          const attRaw = parts[3];
          if (attRaw === "") missingFields.push("出勤率");
          else attendance = attRaw;

          const hwJoined = parts.slice(4).join(",").trim();
          if (hwJoined === "") missingFields.push("作业表现");
          else homework = hwJoined;
        }
      }

      return {
        name,
        last,
        current,
        attendance,
        homework,
        hasLast,
        missingFields,
      };
    }

    async function generateCommentForStudent(row) {
      const tierKey = pickTierKey(row.current);
      const tierLabel = 
        tierKey === "gold" ? "金牌激励型" : 
        tierKey === "steady" ? "稳步进阶型" : "诊断关怀型";

      const promptContent = `
        学生姓名：${row.name}
        本次成绩：${row.current}
        ${row.hasLast ? `上次成绩：${row.last}` : ""}
        ${row.attendance ? `出勤率：${row.attendance}` : ""}
        ${row.homework ? `作业表现：${row.homework}` : ""}
        
        请根据以上数据生成一段约 150 字的评语。要求：
        1. 针对该学生的具体表现（进步、退步、稳定、出勤、作业等）进行点评。
        2. 给出具体的改进建议。
        3. 语气要亲切、自然。
        4. 只返回评语内容，不要包含其他解释。
      `;

      try {
        const response = await fetch(AI_CONFIG.apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${AI_CONFIG.apiKey}`
          },
          body: JSON.stringify({
            model: AI_CONFIG.model,
            messages: [
              { role: "system", content: AI_CONFIG.systemPrompt },
              { role: "user", content: promptContent }
            ],
            stream: false
          })
        });

        const responseData = await response.json();

        if (!response.ok) {
          const errMsg = responseData.error ? responseData.error.message : (responseData.message || response.statusText);
          throw new Error(`API 请求失败 (${response.status}): ${errMsg}`);
        }

        const text = responseData.choices[0].message.content.trim();
        return { tierKey, label: tierLabel, text };
      } catch (error) {
        console.error("AI 生成失败:", error);
        return { 
          tierKey, 
          label: "生成失败", 
          text: `生成评语时发生错误：${error.message}。请检查网络连接。`,
          isError: true 
        };
      }
    }

    function parseInput(text) {
      const lines = text.split(/\r?\n/);
      const rows = [];
      for (const line of lines) {
        const p = parseLine(line);
        if (p === null) continue;
        rows.push(p);
      }
      return rows;
    }

    async function buildDisplayItems(parsed, onUpdate) {
      const out = [];
      // 并行请求，但为了 UI 体验，我们可以一个个更新
      const promises = parsed.map(async (item) => {
        if (item.error) {
          return { error: item.error };
        }
        
        // 创建一个占位项，表示正在生成
        const placeholder = {
          ...item,
          label: "正在生成...",
          text: "AI 正在思考中，请稍候...",
          loading: true
        };
        
        // 我们需要一种方式通知 UI 某个项已经开始处理或已完成
        // 这里简单处理：先返回占位符，等完成后再替换
        const result = await generateCommentForStudent(item);
        return {
          ...item,
          ...result
        };
      });

      return await Promise.all(promises);
    }

    function renderResults(items) {
      const root = document.getElementById("results");
      root.innerHTML = "";

      if (!items.length) {
        root.innerHTML =
          '<p class="empty-state">暂无数据。请在左侧输入至少一行有效内容后点击生成 AI 评语。</p>';
        return;
      }

      for (const item of items) {
        const card = document.createElement("article");
        card.className = "card" + (item.error || item.isError ? " card-error" : "");
        if (item.loading) card.classList.add("card-loading");

        if (item.error) {
          card.innerHTML = `<div class="card-head"><h3 class="card-name">解析错误</h3></div><p class="card-comment"></p>`;
          card.querySelector(".card-comment").textContent = item.error;
          root.appendChild(card);
          continue;
        }

        const badgeClass = badgeClassForTier(item.tierKey);
        card.innerHTML = `
          <div class="card-head">
            <h3 class="card-name"></h3>
            <span class="badge ${badgeClass}"></span>
          </div>
          <p class="card-meta"></p>
          <p class="card-comment"></p>
        `;
        card.querySelector(".card-name").textContent = item.name;
        card.querySelector(".badge").textContent = item.label;

        const metaBits = [];
        if (item.hasLast && item.last != null && !Number.isNaN(item.last)) {
          metaBits.push(`上次 ${item.last} 分`);
        }
        metaBits.push(`本次 ${item.current} 分`);
        if (item.attendance != null && item.attendance !== "") {
          metaBits.push(`出勤 ${item.attendance}`);
        }
        if (item.homework != null && item.homework !== "") {
          metaBits.push(`作业 ${item.homework}`);
        }
        let metaStr = metaBits.join(" · ");
        if (item.missingFields && item.missingFields.length) {
          metaStr += ` · 未提供列：${item.missingFields.join("、")}`;
        }
        card.querySelector(".card-meta").textContent = metaStr;
        card.querySelector(".card-comment").textContent = item.text;
        root.appendChild(card);
      }
    }

    function exportExcel() {
      if (!lastExportRows.length) {
        alert("请先生成评语后再导出。");
        return;
      }

      const aoa = [["姓名", "评语"], ...lastExportRows];

      if (typeof XLSX !== "undefined" && XLSX.utils && XLSX.writeFile) {
        try {
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.aoa_to_sheet(aoa);
          XLSX.utils.book_append_sheet(wb, ws, "评语");
          XLSX.writeFile(wb, "学生评语.xlsx", { bookType: "xlsx" });
          return;
        } catch (e) {
          console.warn("XLSX export failed, fallback CSV", e);
        }
      }

      const csvEscape = (cell) => {
        const s = String(cell == null ? "" : cell).replace(/"/g, '""');
        return `"${s}"`;
      };
      const bom = "\uFEFF";
      const lines = aoa.map((row) => row.map(csvEscape).join(",")).join("\r\n");
      const blob = new Blob([bom + lines], {
        type: "text/csv;charset=utf-8;",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "学生评语.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    let lastDisplayItems = [];

    document.getElementById("btn-generate").addEventListener("click", async () => {
      const btn = document.getElementById("btn-generate");
      const text = document.getElementById("bulk-input").value;
      const parsed = parseInput(text);
      
      if (parsed.length === 0) {
        alert("请输入学生数据。");
        return;
      }

      if (parsed.some((p) => p && p.error)) {
        alert(PARSE_ERROR_MSG);
        return;
      }

      btn.disabled = true;
      btn.textContent = "AI 正在生成中...";

      // 先渲染加载状态
      const initialItems = parsed.map(item => ({
        ...item,
        label: "准备生成...",
        text: "正在排队调用 AI 接口...",
        loading: true
      }));
      renderResults(initialItems);

      try {
        lastDisplayItems = await buildDisplayItems(parsed);
        renderResults(lastDisplayItems);

        lastExportRows = lastDisplayItems
          .filter((p) => !p.error && !p.isError)
          .map((p) => [p.name, p.text]);
        document.getElementById("btn-export").disabled = lastExportRows.length === 0;
      } catch (err) {
        alert("生成过程中发生错误，请查看控制台。");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "生成 AI 评语";
      }
    });

    document.getElementById("btn-export").addEventListener("click", exportExcel);

    // 初始化
    lastDisplayItems = [];
    renderResults([]);
  </script>
</body>
</html>
